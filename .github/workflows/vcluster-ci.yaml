name: vCluster CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  kubernetes-test:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Install kubectl (Kubernetes CLI)
      - name: Install kubectl
        run: |
          curl -LO https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # Install vCluster CLI
      - name: Install vCluster CLI
        run: |
          curl -L https://github.com/loft-sh/vcluster/releases/latest/download/vcluster-linux-amd64 -o vcluster
          chmod +x vcluster
          sudo mv vcluster /usr/local/bin/

      # Enable Docker driver for running vCluster locally
      - name: Enable Docker Driver
        run: |
          vcluster use driver docker

      # Create virtual Kubernetes cluster
      - name: Create vCluster
        run: |
          vcluster create ci-cluster --connect=false
          vcluster connect ci-cluster

      # Verify cluster nodes
      - name: Verify Cluster
        run: |
          kubectl get nodes

      # Deploy Kubernetes application
      - name: Deploy Application
        run: |
          kubectl apply -f k8s/deployment.yaml

      # Check pod status
      - name: Verify Pods
        run: |
          kubectl get pods

      # Wait until pods become ready
      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=ready pod -l app=demo --timeout=180s

      # Run deployment rollout test
      - name: Run Tests
        run: |
          kubectl rollout status deployment/demo-app

      # Debug info if something fails
      - name: Debug Pods
        if: failure()
        run: |
          kubectl get pods
          kubectl describe pods

      # Delete cluster after tests
      - name: Delete Cluster
        if: always()
        run: |
          vcluster delete ci-cluster
